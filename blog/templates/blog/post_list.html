<!doctype html>
<html>
  <head>
    <title>Draftly - The home of daily drafts</title>
  </head>
  <body>
    <h1>Blog Posts</h1>
    {% for post in posts %}
        <article>
            <time>published: {{ post.published_date }}</time>
            <h2><a href="">{{ post.title }}</a></h2>
            <p>{{ post.text|linebreaksbr }}</p>
        </article>
    {% endfor %}
  </body>
</html>
